<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>摸金战场 TombRoyale</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏺</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      font-family: 'Microsoft YaHei', sans-serif;
      background: #000;
    }
    
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    
    /* 十字准星 */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      pointer-events: none;
      z-index: 100;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
    }

    #crosshair::before {
      width: 2px;
      height: 20px;
      left: 50%;
      transform: translateX(-50%);
    }

    #crosshair::after {
      width: 20px;
      height: 2px;
      top: 50%;
      transform: translateY(-50%);
    }
    
    /* 加载界面 */
    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      color: #fff;
    }
    
    #loading-screen h1 {
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }
    
    #loading-screen .subtitle {
      font-size: 24px;
      color: #888;
      margin-bottom: 40px;
    }
    
    #loading-bar {
      width: 300px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }
    
    #loading-progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      transition: width 0.3s;
    }
    
    #loading-text {
      margin-top: 15px;
      font-size: 14px;
      color: #888;
    }
    
    /* 开始按钮 */
    #start-btn {
      margin-top: 30px;
      padding: 15px 50px;
      font-size: 24px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none;
      border-radius: 10px;
      color: #000;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    #start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }
    
    /* 游戏结束界面 */
    #game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      color: #fff;
    }
    
    #game-over-screen h1 {
      font-size: 64px;
      margin-bottom: 20px;
      color: #ffd700;
    }
    
    #game-over-screen .stats {
      font-size: 24px;
      margin-bottom: 30px;
    }
    
    #restart-btn {
      padding: 15px 40px;
      font-size: 20px;
      background: linear-gradient(135deg, #4CAF50, #45a049);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }
    
    #restart-btn:hover {
      transform: scale(1.05);
    }
    
    /* 提示信息 */
    #hint {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      text-align: center;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- 加载界面 -->
    <div id="loading-screen">
      <h1>🏺 摸金战场</h1>
      <div class="subtitle">TombRoyale</div>
      <div id="loading-bar">
        <div id="loading-progress"></div>
      </div>
      <div id="loading-text">正在加载资源...</div>
      <button id="start-btn">开始游戏</button>
    </div>
    
    <!-- 游戏结束界面 -->
    <div id="game-over-screen">
      <h1 id="game-over-title">大吉大利，今晚吃鸡!</h1>
      <div class="stats" id="game-over-stats"></div>
      <button id="restart-btn">再来一局</button>
    </div>
    
    <!-- 游戏画布 -->
    <div id="canvas-container"></div>
    
    <!-- 十字准星 -->
    <div id="crosshair"></div>
    
    <!-- 提示信息 -->
    <div id="hint">按 ESC 退出指针锁定</div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
